<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Публичная встреча и Изучение Сторожевой башни</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --main-blue: #0066b3; 
            --text-dark: #000000;
            --text-blue: #0066b3;
            --rs-red: #d32f2f;   
            --pastel-blue: #e6f2fa; 
            --pastel-red: #fdf2f2;  
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            padding: 20px 0;
        }

        /* Контейнер для адаптивного масштабирования под мобильные экраны */
        .page-wrapper {
            width: 100%;
            overflow-x: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 10px;
        }

        /* Панель управления */
        .controls-panel {
            width: 210mm;
            max-width: 100%;
            margin: 0 auto 15px auto;
            text-align: right;
        }
        .btn-print {
            background-color: var(--main-blue);
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 11pt;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
        }
        .btn-print:hover { opacity: 0.9; }

        /* Контейнер листа А4 (Книжный) */
        .a4-page {
            width: 210mm;
            min-height: 297mm;
            padding: 12mm 15mm;
            background-color: var(--card-bg);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.08);
            position: relative;
            transform-origin: top center;
        }

        /* Заголовки */
        .header-title {
            text-align: center;
            font-size: 16pt;
            font-weight: bold;
            color: var(--text-blue);
            text-transform: uppercase;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }
        .header-subtitle {
            text-align: center;
            font-size: 13pt;
            font-weight: bold;
            color: #555555;
            margin-bottom: 20px;
        }

        /* Карточки разделов программы */
        .section-card {
            border: 1.5px solid var(--main-blue);
            border-radius: 6px;
            margin-bottom: 15px;
            overflow: hidden;
            background-color: var(--card-bg);
        }
        .section-card.rs-special {
            border-color: var(--rs-red);
        }

        .card-header {
            background-color: var(--pastel-blue);
            color: var(--text-blue);
            padding: 8px 12px;
            font-size: 12pt;
            font-weight: bold;
            border-bottom: 1.5px solid var(--main-blue);
            text-transform: uppercase;
        }
        .rs-special .card-header {
            background-color: var(--pastel-red);
            color: var(--rs-red);
            border-bottom-color: var(--rs-red);
        }

        .card-body {
            padding: 12px;
        }

        /* Строки элементов */
        .program-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
            line-height: 1.3;
        }
        .program-row:last-child { margin-bottom: 0; }

        .row-label {
            flex: 1;
            font-weight: bold;
        }
        .row-value {
            font-weight: bold;
            color: var(--text-blue);
            text-align: right;
            max-width: 60%;
        }
        .rs-special .row-value {
            color: var(--rs-red);
        }

        /* НАЗВАНИЯ РЕЧЕЙ И КОНГРЕССОВ — Увеличено на 1 пункт с !important */
        .speech-topic {
            display: block;
            width: 100%;
            text-align: center;
            font-weight: bold;
            color: var(--text-dark);
            text-transform: uppercase;
            font-size: 13pt !important; 
            margin: 6px 0;
            line-height: 1.3;
        }
        .rs-special .speech-topic {
            color: var(--rs-red);
        }

        .time-badge {
            color: #666666;
            font-style: italic;
            font-size: 10pt;
            white-space: nowrap;
        }

        .hidden-element {
            display: none !important;
        }

        @media screen and (max-width: 210mm) {
            body { padding: 10px 0; }
            .controls-panel { width: 100%; padding: 0 10px; }
            .a4-page {
                transform: scale(calc(var(--mobile-scale, 1)));
                box-shadow: none;
                margin: 0;
            }
        }

        @media print {
            body { background-color: #ffffff; padding: 0; margin: 0; }
            .page-wrapper { padding: 0; display: block; }
            .controls-panel { display: none !important; }
            .a4-page { box-shadow: none !important; padding: 0 !important; margin: 0 !important; width: 100% !important; transform: none !important; }
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <div class="controls-panel">
            <button class="btn-print" onclick="window.print()">Печать / PDF</button>
        </div>

        <div class="a4-page" id="mainPage">
            
            <div class="header-title">Публичная встреча и Изучение Сторожевой башни</div>
            <div class="header-subtitle">
                <span id="cfg_date_weekend">...</span> г.
            </div>

            <!-- КАРТОЧКА 1: ПУБЛИЧНАЯ ВСТРЕЧА -->
            <div class="section-card" id="card_public">
                <div class="card-header">🔊 Публичная встреча</div>
                <div class="card-body">
                    <div class="program-row">
                        <div class="row-label">Председатель:</div>
                        <div class="row-value" id="we_chairman">...</div>
                    </div>
                    <div class="program-row">
                        <div class="row-label">Песня № <span id="we_song_start">...</span> и молитва:</div>
                        <div class="row-value" id="we_prayer_start">...</div>
                    </div>
                    <div class="program-row" style="margin-top: 10px; display: block;">
                        <div style="display: flex; justify-content: space-between;">
                            <div class="row-label">Публичная речь <span class="time-badge">(30 мин.):</span></div>
                            <div class="row-value" id="we_public_speaker">...</div>
                        </div>
                        <!-- Название речи крупным шрифтом -->
                        <div class="speech-topic" id="we_public_topic">...</div>
                    </div>
                </div>
            </div>

            <!-- КАРТОЧКА 2: ИЗУЧЕНИЕ СТОРОЖЕВОЙ БАШНИ -->
            <div class="section-card" id="card_wt">
                <div class="card-header">📖 Изучение Сторожевой башни</div>
                <div class="card-body">
                    <div class="program-row">
                        <div class="row-label">Песня № <span id="we_song_middle">...</span></div>
                        <div class="row-value"></div>
                    </div>
                    <div class="program-row">
                        <div class="row-label">Ведущий:</div>
                        <div class="row-value" id="we_wt_conductor">...</div>
                    </div>
                    <div class="program-row">
                        <div class="row-label">Чтец:</div>
                        <div class="row-value" id="we_wt_reader">...</div>
                    </div>
                </div>
            </div>

            <!-- КАРТОЧКА 3: ЗАКЛЮЧИТЕЛЬНАЯ ЧАСТЬ -->
            <div class="section-card" id="card_close">
                <div class="card-header">📌 Заключение встречи</div>
                <div class="card-body">
                    <div class="program-row">
                        <div class="row-label">Песня № <span id="we_song_end">...</span> и молитва:</div>
                        <div class="row-value" id="we_prayer_end">...</div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        /* ========================================================================= */
        /* ПРИМЕЧАНИЕ: ВСТАВЬ СВОЙ API-КЛЮЧ И ID ТАБЛИЦЫ НИЖЕ ВМЕСТО ЭТИХ СТРОК    */
        /* ========================================================================= */
        const API_KEY = 'AIzaSyDwi1V8A5wvGwXCKtM_QmJ0eqTNG1hIoEg'; 
        const SPREADSHEET_ID = '1zKuNfeFfe3SwHuXriJJYnB7mN76cnFyhgcrZpoua05E';
        /* ========================================================================= */

        const baseUrl = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values`;

        function adjustMobileScale() {
            const page = document.getElementById('mainPage');
            const wrapper = document.querySelector('.page-wrapper');
            if (window.innerWidth < 820) {
                const scale = (wrapper.offsetWidth - 20) / 794; // 210mm в пикселях
                document.documentElement.style.setProperty('--mobile-scale', scale);
                page.style.marginBottom = `calc(297mm * (${scale} - 1))`;
            } else {
                page.style.transform = 'none';
                page.style.marginBottom = '0px';
            }
        }
        window.addEventListener('resize', adjustMobileScale);

        async function fetchSheetData(range) {
            try {
                const response = await fetch(`${baseUrl}/${encodeURIComponent(range)}?key=${API_KEY}`);
                const data = await response.json();
                return data.values || [];
            } catch (error) {
                console.error(`Ошибка получения данных с листа ${range}:`, error);
                return [];
            }
        }

        function convertToMap(rows) {
            const map = {};
            rows.forEach(row => {
                if (row[0]) map[row[0].trim()] = row[1] ? row[1].trim() : '';
            });
            return map;
        }

        async function initDashboard() {
            // 1. ЗАГРУЗКА НАСТРОЕК (ДАТА)
            const settingsRows = await fetchSheetData('Настройки!A:B');
            const settings = convertToMap(settingsRows);
            
            if (settings['ДатаОкончания']) {
                const formatDate = (dStr) => dStr.split('-').reverse().join('.');
                document.getElementById('cfg_date_weekend').innerText = formatDate(settings['ДатаОкончания']);
            }

            // 2. ЗАГРУЗКА ДАННЫХ ВЫХОДНОГО ДНЯ
            const weRows = await fetchSheetData('ВыходнойДень!A:B');
            const we = convertToMap(weRows);
            
            document.getElementById('we_chairman').innerText = we['Председатель'] || '';
            document.getElementById('we_song_start').innerText = we['ПесняНачало'] || '';
            document.getElementById('we_prayer_start').innerText = we['МолитваНачало'] || we['Председатель'] || '';
            
            document.getElementById('we_public_speaker').innerText = we['Докладчик'] || '';
            document.getElementById('we_public_topic').innerText = we['ТемаРечи'] || '';
            
            document.getElementById('we_song_middle').innerText = we['ПесняСередина'] || '';
            document.getElementById('we_wt_conductor').innerText = we['ВедущийСБ'] || '';
            document.getElementById('we_wt_reader').innerText = we['ЧтецСБ'] || '';
            
            document.getElementById('we_song_end').innerText = we['ПесняКонец'] || '';
            document.getElementById('we_prayer_end').innerText = we['МолитваКонец'] || '';

            // Принудительный пересчет масштаба после отрисовки данных
            adjustMobileScale();
        }

        document.addEventListener('DOMContentLoaded', () => {
            initDashboard();
            adjustMobileScale();
        });
    </script>
</body>
</html>
